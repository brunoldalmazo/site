<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Música</title>
</head>
<body style="background:black; color:white; text-align:center;">

<audio id="player" autoplay>
  <source src="https://www.dropbox.com/scl/fi/nbzbjz3ftnxae4adkrxi2/essaeabella.mp3?rlkey=xuhjdm1l3jbikt4fmrisedu7s&st=ckz5bfa9&raw=1" type="audio/mpeg">
</audio>

<script>
  const player = document.getElementById("player");

  player.play().catch(() => {
    const btn = document.createElement("button");
    btn.innerText = "▶️ Tocar música";
    btn.style.fontSize = "20px";
    btn.onclick = () => player.play();
    document.body.appendChild(btn);
  });
</script>

</body>
</html>
